# .github/workflows/ci-main.yml
# CI pipeline for the `main` branch — the production gate.
# Every test AND spellcheck MUST pass. No exceptions.
# This runs on every push and pull request targeting main.

name: CI — Main

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Run all structural and contract tests ───────────────────
  test:
    name: Run Tests 🧪
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository 🗄️
        uses: actions/checkout@v4

      # Make all test scripts executable
      - name: Make test scripts executable 📜
        run: chmod +x tests/*.sh

      - name: "Verify expected skills exist 🗂️"
        run: |
          EXPECTED="kos kos-ingest kos-query kos-lint kos-archive"
          for skill in $EXPECTED; do
            if [ ! -f "skills/$skill/SKILL.md" ]; then
              echo "❌ Missing: skills/$skill/SKILL.md"
              exit 1
            else
              echo "✅ Found: skills/$skill/SKILL.md"
            fi
          done

      - name: "Test 1/5 — Repository Structure 🗃️"
        run: ./tests/test_structure.sh

      - name: "Test 2/5 — Skill File Compliance 🥷"
        run: ./tests/test_skills.sh

      - name: "Test 3/5 — Template Integrity 🗂️"
        run: ./tests/test_templates.sh

      - name: "Test 4/5 — Schema Contract 📃"
        run: ./tests/test_schema_contract.sh

      - name: "Test 5/5 — Lint Rules Dry Run 🏃‍➡️"
        run: ./tests/test_lint_rules.sh

  # ── Job 2: Spellcheck all markdown files ──────────────────────────
  # Uses `typos` — a fast, zero-config Rust spell checker.
  # Custom exceptions live in .typos.toml at the repo root.
  spellcheck:
    name: Spellcheck 🔤
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository 🗄️
        uses: actions/checkout@v4

      - name: Install typos
        uses: taiki-e/install-action@v2
        with:
          tool: typos

      # Spellcheck all markdown files across skills/, templates/, docs/, and root
      - name: Run spellcheck
        run: typos skills/ templates/ docs/ tests/ README.md

  # ── Job 3: PR gate — both jobs must pass before merge ─────────────
  gate:
    name: Gate (All Clear) ⛩️
    runs-on: ubuntu-latest
    needs: [test, spellcheck]

    steps:
      - name: All checks passed
        run: echo "✅ All tests and spellcheck passed. Safe to merge."
