# .github/workflows/ci-dev.yml
# CI pipeline for the `dev` branch — exploratory, but not lawless.
# All tests must pass (hard fail). Spellcheck runs but does NOT block
# merge — it posts warnings so you see typos without stopping WIP commits.

name: CI — Dev

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  # ── Job 1: Run all structural and contract tests ───────────────────
  # These are the same strict tests as main. Structure and contracts
  # must always be valid — even in dev. These DO block on failure.
  test:
    name: Run Tests 🧪
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository 🗄️
        uses: actions/checkout@v4

      # Make all test scripts executable
      - name: Make test scripts executable 📜
        run: chmod +x tests/*.sh

      - name: Verify expected skills exist 🗂️
        run: |
          EXPECTED="kos kos-ingest kos-query kos-lint kos-archive"
          for skill in $EXPECTED; do
            if [ ! -f "skills/$skill/SKILL.md" ]; then
              echo "❌ Missing: skills/$skill/SKILL.md"
              exit 1
            else
              echo "✅ Found: skills/$skill/SKILL.md"
            fi
          done

      - name: "Test 1/5 — Repository Structure 🗃️"
        run: ./tests/test_structure.sh

      - name: "Test 2/5 — Skill File Compliance 🥷"
        run: ./tests/test_skills.sh

      - name: "Test 3/5 — Template Integrity 🗂️"
        run: ./tests/test_templates.sh

      - name: "Test 4/5 — Schema Contract 📃"
        run: ./tests/test_schema_contract.sh

      - name: "Test 5/5 — Lint Rules Dry Run 🏃‍➡️"
        run: ./tests/test_lint_rules.sh

  # ── Job 2: Spellcheck — warns but does NOT block merge ────────────
  # `continue-on-error: true` means a spellcheck failure marks the
  # step yellow (warning) instead of red (failure). You see it;
  # it doesn't stop you. Fix it before opening a PR to main.
  spellcheck:
    name: Spellcheck (non-blocking) 🔤
    runs-on: ubuntu-latest
    continue-on-error: true  # <-- This is what makes it a warning, not a gate

    steps:
      - name: Checkout repository 🗄️
        uses: actions/checkout@v4

      - name: Install typos
        uses: taiki-e/install-action@v2
        with:
          tool: typos

      - name: Run spellcheck
        # The `|| true` also softens the exit code at the shell level
        # so the step doesn't propagate a hard failure to the job summary
        run: typos skills/ templates/ docs/ README.md || true

      - name: Spellcheck reminder ⚠️
        run: |
          echo "⚠️  Spellcheck is non-blocking on dev."
          echo "   Fix any typos before opening a PR to main."

  # ── Job 3: Dev gate — tests must pass; spellcheck is advisory ─────
  # Unlike main's gate, spellcheck is NOT in `needs` here.
  # Only the test job blocks the dev gate.
  gate:
    name: Gate (Tests Clear) ⛩️
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: All tests passed
        run: echo "✅ All structural tests passed. Spellcheck is advisory on dev — fix warnings before PR to main."
